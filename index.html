<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1a0f08" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mojave Run" />
<meta name="format-detection" content="telephone=no" />
<meta name="description" content="A wasteland arcade driver. Survive the Mojave. Mobile-first browser game." />
<meta property="og:title" content="MOJAVE RUN" />
<meta property="og:description" content="A wasteland arcade driver. Survive the Mojave." />
<meta property="og:type" content="website" />
<title>MOJAVE RUN</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="apple-touch-icon" href="/icon.svg" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --safe-t:env(safe-area-inset-top, 0px);
    --safe-b:env(safe-area-inset-bottom, 0px);
    --safe-l:env(safe-area-inset-left, 0px);
    --safe-r:env(safe-area-inset-right, 0px);
  }
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    background:#000;
    font-family:'Courier New',ui-monospace,monospace;
    color:#f5d76e;
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    overscroll-behavior:none;
    touch-action:none;
    position:fixed;inset:0;
  }
  body{display:flex;align-items:center;justify-content:center}
  #wrap{position:fixed;inset:0;width:100%;height:100%}
  canvas{
    display:block;
    width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;
    background:#1a0f08;
    touch-action:none;
  }
  #fsBtn{
    position:absolute;
    top:calc(8px + var(--safe-t));
    right:calc(8px + var(--safe-r));
    width:42px;height:42px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(245,215,110,.4);
    color:#f5d76e;
    border-radius:6px;
    cursor:pointer;
    font-size:20px;
    -webkit-backdrop-filter:blur(4px);
    backdrop-filter:blur(4px);
    z-index:10;
    transition:opacity .25s, transform .15s;
    opacity:.85;
  }
  #fsBtn:active{transform:scale(.92)}
  #fsBtn.hidden{opacity:0;pointer-events:none}
  #hint{
    position:absolute;
    left:50%;top:calc(80px + var(--safe-t));
    transform:translateX(-50%);
    background:rgba(0,0,0,.55);
    border:1px solid rgba(245,215,110,.35);
    color:#f5d76e;
    padding:8px 14px;
    font-size:11px;
    letter-spacing:1.5px;
    border-radius:4px;
    pointer-events:none;
    opacity:0;
    transition:opacity .4s;
    z-index:9;
    -webkit-backdrop-filter:blur(4px);
    backdrop-filter:blur(4px);
    text-align:center;
    white-space:nowrap;
  }
  #hint.show{opacity:1}
  #footer{
    position:absolute;
    bottom:calc(4px + var(--safe-b));
    right:calc(8px + var(--safe-r));
    font-size:9px;opacity:.35;letter-spacing:1.5px;
    pointer-events:none;
  }
  #rotate{
    display:none;
    position:fixed;inset:0;
    background:#1a0f08;
    color:#f5d76e;
    align-items:center;justify-content:center;
    text-align:center;
    z-index:100;
    font-size:14px;letter-spacing:2px;
    padding:24px;
  }
  @media (orientation:landscape) and (max-height:480px){
    #rotate{display:flex}
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" tabindex="0"></canvas>
  <button id="fsBtn" aria-label="Toggle fullscreen" title="Fullscreen (F)">⛶</button>
  <div id="hint">DRAG TO STEER · HOLD TO FIRE</div>
  <div id="footer">1COMMERCE // MOJAVE RUN</div>
</div>
<div id="rotate">
  <div>
    <div style="font-size:32px;margin-bottom:12px">📱</div>
    <div style="font-weight:bold;margin-bottom:8px">ROTATE YOUR DEVICE</div>
    <div style="opacity:.7;font-size:11px">MOJAVE RUN PLAYS BEST IN PORTRAIT</div>
  </div>
</div>
<script>
(() => {
  'use strict';

  const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const IS_MOBILE = IS_TOUCH && Math.min(window.innerWidth, window.innerHeight) < 900;

  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d', { alpha: false });
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, IS_MOBILE ? 1.5 : 2);
    W = cvs.clientWidth = window.innerWidth;
    H = cvs.clientHeight = window.innerHeight;
    cvs.width = Math.floor(W * DPR);
    cvs.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false;
    if (game && game.player && Array.isArray(game.players)) {
      const { x0, x1 } = roadBounds();
      for (const p of game.players) {
        p.x = clamp(p.x, x0 + p.w/2 + 4, x1 - p.w/2 - 4);
        p.y = H - 110 - (game.mode !== 'solo' ? p.id * 18 : 0);
      }
    }
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  }
  function blip(freq, dur, type='square', vol=0.08, slide=0) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + dur);
  }
  function noise(dur, vol=0.12, filterFreq=800) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = filterFreq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f).connect(g).connect(audioCtx.destination);
    src.start(t);
  }
  const SFX = {
    shoot: () => blip(880, 0.06, 'square', 0.05, -300),
    hit:   () => { noise(0.18, 0.18, 1200); blip(120, 0.18, 'sawtooth', 0.06, -60); },
    pickup:() => { blip(660, 0.06, 'triangle', 0.08); setTimeout(()=>blip(990,0.08,'triangle',0.08),50); },
    explode:() => { noise(0.45, 0.25, 600); blip(80, 0.4, 'sawtooth', 0.1, -40); },
    death: () => { blip(220,0.4,'sawtooth',0.12,-180); noise(0.6,0.3,500); },
    start: () => { blip(440,0.08,'square',0.06); setTimeout(()=>blip(660,0.08,'square',0.06),80); setTimeout(()=>blip(880,0.12,'square',0.06),160); },
  };

  const MODES = ['solo', 'coop', 'pvp'];
  const MODE_LABELS = {
    solo: 'SOLO RUN',
    coop: 'CO-OP CONVOY',
    pvp: 'PVP DUEL',
  };
  const MODE_SELECTOR_HALF_W = 220;
  const MODE_SELECTOR_W_FRAC = 0.42;
  const MODE_SELECTOR_Y_FRAC = 0.68;
  const MODE_SELECTOR_HALF_H = 34;
  const DEFAULT_BULLET_SPREAD = 10;
  const PVP_BULLET_SPREAD = 8;
  const HUD_BAR = {
    solo: { width: 180, frac: 0.42 },
    coop: { width: 110, frac: 0.28 },
    pvp: { width: 110, frac: 0.28 },
  };
  const keys = Object.create(null);
  const input = {
    players: [
      { left:false, right:false, fire:false, touchTargetX:null, touchFire:false },
      { left:false, right:false, fire:false, touchTargetX:null, touchFire:false },
    ],
  };
  const activePointers = new Map();

  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (['arrowleft','arrowright','arrowup','arrowdown',' '].includes(e.key.toLowerCase())) e.preventDefault();
    ensureAudio();
    if (e.key.toLowerCase() === 'f') toggleFullscreen();
    if (e.key.toLowerCase() === 'p' && game.state === 'playing') game.paused = !game.paused;
    if (game.state === 'title') {
      if (e.key.toLowerCase() === 'm' || e.key.toLowerCase() === 'c') { cycleMode(); return; }
      if (['1','2','3'].includes(e.key)) { game.mode = MODES[Number(e.key) - 1]; return; }
    }
    if (game.state !== 'playing') {
      if (e.key.toLowerCase() === 'r' || e.key === 'Enter' || e.key === ' ') startGame();
    }
  }, { passive:false });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function onPointerDown(e) {
    ensureAudio();
    if (game.state !== 'playing') {
      e.preventDefault();
      if (game.state === 'title' && hitModeSelector(e.clientX, e.clientY)) {
        cycleMode();
        return;
      }
      startGame();
      activePointers.set(e.pointerId, { x:e.clientX, player: pointerPlayerIndex(e.clientX) });
      try { cvs.setPointerCapture(e.pointerId); } catch(_){}
      updateTouchInput();
      return;
    }
    if (game.paused) {
      game.paused = false;
      return;
    }
    e.preventDefault();
    try { cvs.setPointerCapture(e.pointerId); } catch(_){}
    activePointers.set(e.pointerId, { x:e.clientX, player: pointerPlayerIndex(e.clientX) });
    updateTouchInput();
  }
  function onPointerMove(e) {
    if (activePointers.has(e.pointerId)) {
      const rec = activePointers.get(e.pointerId);
      activePointers.set(e.pointerId, { x:e.clientX, player: rec ? rec.player : pointerPlayerIndex(e.clientX) });
      updateTouchInput();
    }
  }
  function onPointerEnd(e) {
    activePointers.delete(e.pointerId);
    updateTouchInput();
  }
  function updateTouchInput() {
    for (const p of input.players) {
      p.touchTargetX = null;
      p.touchFire = false;
    }
    for (const rec of activePointers.values()) {
      const idx = clamp(rec.player, 0, playerCount() - 1);
      input.players[idx].touchTargetX = rec.x;
      input.players[idx].touchFire = true;
    }
  }
  cvs.addEventListener('pointerdown', onPointerDown);
  cvs.addEventListener('pointermove', onPointerMove);
  cvs.addEventListener('pointerup',   onPointerEnd);
  cvs.addEventListener('pointercancel', onPointerEnd);
  cvs.addEventListener('pointerleave', onPointerEnd);
  ['touchstart','touchmove','touchend','gesturestart','contextmenu'].forEach(ev =>
    cvs.addEventListener(ev, e => e.preventDefault(), { passive:false })
  );

  function readKbd() {
    input.players[0].left  = !!keys['a'];
    input.players[0].right = !!keys['d'];
    input.players[0].fire  = !!(keys[' '] || keys['z'] || keys['x']) || input.players[0].touchFire;
    input.players[1].left  = !!keys['arrowleft'];
    input.players[1].right = !!keys['arrowright'];
    input.players[1].fire  = !!(keys['enter'] || keys['shift'] || keys['/']) || input.players[1].touchFire;
    if (game.mode === 'solo') {
      input.players[0].left = input.players[0].left || !!keys['arrowleft'];
      input.players[0].right = input.players[0].right || !!keys['arrowright'];
    }
  }

  const fsBtn = document.getElementById('fsBtn');
  function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) req.call(el).catch(()=>{});
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('portrait').catch(()=>{});
      }
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document).catch(()=>{});
    }
  }
  fsBtn.addEventListener('click', e => { e.stopPropagation(); toggleFullscreen(); });
  fsBtn.addEventListener('pointerdown', e => e.stopPropagation());

  let wakeLock = null;
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch(_) {}
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && game.state === 'playing') {
      requestWakeLock();
    } else {
      if (game.state === 'playing') game.paused = true;
      releaseWakeLock();
    }
  });

  const game = {
    state: 'title',
    paused: false,
    t: 0,
    score: 0,
    best: parseInt(localStorage.getItem('mojaveRunBest') || '0', 10) || 0,
    distance: 0,
    speed: 280,
    targetSpeed: 280,
    health: 100,
    fireCooldown: 0,
    spawnTimer: 0,
    pickupTimer: 0,
    shake: 0,
    flash: 0,
    level: 1,
    hintTime: 0,
    mode: 'solo',
    winner: null,
    players: [],
    player: null,
    bullets: [],
    enemies: [],
    obstacles: [],
    pickups: [],
    enemyBullets: [],
    particles: [],
    decor: [],
    laneOffset: 0,
  };

  function makePlayer(id) {
    const colors = [
      { body:'#a86a2e', hood:'#8a4f1f', glass:'#a8d8e8', glow:'#f5d76e', name:'P1' },
      { body:'#2e7aa8', hood:'#1f568a', glass:'#b9f2ff', glow:'#68d9ff', name:'P2' },
    ];
    return { id, x:0, y:0, w:42, h:64, vx:0, health:100, fireCooldown:0, alive:true, score:0, kos:0, color:colors[id] };
  }

  function playerCount() {
    return game.mode === 'solo' ? 1 : 2;
  }

  function activePlayers() {
    return game.players.slice(0, playerCount()).filter(p => p.alive);
  }

  function nearestPlayer(x, y) {
    const players = activePlayers();
    if (!players.length) return null;
    let best = players[0], bestD = Infinity;
    for (const p of players) {
      const d = Math.hypot(p.x - x, p.y - y);
      if (d < bestD) { best = p; bestD = d; }
    }
    return best;
  }

  function pointerPlayerIndex(x) {
    if (game.mode === 'solo') return 0;
    return x < W * 0.5 ? 0 : 1;
  }

  function hitModeSelector(x, y) {
    const rect = modeSelectorRect();
    return Math.abs(x - W / 2) < rect.halfW && Math.abs(y - rect.y) < MODE_SELECTOR_HALF_H;
  }

  function modeSelectorRect() {
    const halfW = Math.min(MODE_SELECTOR_HALF_W, W * MODE_SELECTOR_W_FRAC);
    return { halfW, width: halfW * 2, y: H * MODE_SELECTOR_Y_FRAC };
  }

  function cycleMode() {
    const idx = MODES.indexOf(game.mode);
    game.mode = MODES[(idx + 1) % MODES.length];
    SFX.pickup();
  }

  function positionPlayers() {
    const { x0, x1 } = roadBounds();
    const n = playerCount();
    for (let i = 0; i < game.players.length; i++) {
      const p = game.players[i];
      const spread = n === 1 ? 0 : (i === 0 ? -0.18 : 0.18);
      p.x = clamp(W * (0.5 + spread), x0 + p.w/2 + 4, x1 - p.w/2 - 4);
      p.y = H - 110 - (n > 1 ? i * 18 : 0);
      p.vx = 0;
    }
  }

  function resetGame() {
    game.state = 'playing';
    game.paused = false;
    game.t = 0;
    game.score = 0;
    game.distance = 0;
    game.speed = 280;
    game.targetSpeed = 280;
    game.health = 100;
    game.fireCooldown = 0;
    game.spawnTimer = 0.6;
    game.pickupTimer = 3;
    game.shake = 0;
    game.flash = 0;
    game.level = 1;
    game.hintTime = IS_TOUCH ? 4.5 : 0;
    game.winner = null;
    game.players = [makePlayer(0), makePlayer(1)];
    game.player = game.players[0];
    game.health = 100;
    game.bullets.length = 0;
    game.enemies.length = 0;
    game.obstacles.length = 0;
    game.pickups.length = 0;
    game.enemyBullets.length = 0;
    game.particles.length = 0;
    game.decor.length = 0;
    game.laneOffset = 0;
    positionPlayers();
    for (let i = 0; i < 30; i++) game.decor.push(makeDecor(Math.random() * H));
  }

  function startGame() {
    ensureAudio();
    SFX.start();
    resetGame();
    requestWakeLock();
    fsBtn.classList.add('hidden');
  }

  const rand = (a,b) => a + Math.random() * (b - a);
  const irand = (a,b) => Math.floor(rand(a,b+1));
  const clamp = (v,lo,hi) => v < lo ? lo : v > hi ? hi : v;
  const PARTICLE_SCALE = IS_MOBILE ? 0.65 : 1;

  function roadBounds() {
    const roadFrac = W < 600 ? 0.86 : 0.74;
    const roadW = Math.min(W * roadFrac, 720);
    const x0 = (W - roadW) / 2;
    const x1 = x0 + roadW;
    return { x0, x1, w: roadW };
  }

  function aabb(a, b) {
    return Math.abs(a.x - b.x) * 2 < (a.w + b.w) &&
           Math.abs(a.y - b.y) * 2 < (a.h + b.h);
  }

  function makeDecor(yOverride) {
    const { x0, x1 } = roadBounds();
    const side = Math.random() < 0.5 ? 'L' : 'R';
    const x = side === 'L' ? rand(0, Math.max(8, x0 - 8)) : rand(x1 + 8, W);
    const y = yOverride !== undefined ? yOverride : -20;
    const type = Math.random() < 0.7 ? 'rock' : 'cactus';
    return { x, y, type, size: type === 'rock' ? rand(8, 22) : rand(14, 26), tone: rand(0.6, 1.0) };
  }

  function spawnEnemy() {
    const { x0, x1 } = roadBounds();
    const margin = 32;
    const r = Math.random();
    if (r < 0.45) {
      game.enemies.push({
        kind: 'buggy',
        x: rand(x0 + margin, x1 - margin),
        y: -50, w: 40, h: 56,
        vx: rand(-40, 40),
        vy: rand(60, 110),
        hp: 2, fireT: rand(0.8, 1.6),
      });
    } else if (r < 0.8) {
      game.obstacles.push({
        kind: 'wreck',
        x: rand(x0 + margin, x1 - margin),
        y: -60, w: 44, h: 64,
        rot: rand(-0.4, 0.4),
      });
    } else {
      const cx = rand(x0 + margin, x1 - margin);
      const n = irand(1, 3);
      for (let i = 0; i < n; i++) {
        game.obstacles.push({
          kind: 'barrel',
          x: cx + (i - (n-1)/2) * 26 + rand(-4,4),
          y: -40 - i * 22,
          w: 22, h: 24, hp: 1,
        });
      }
    }
  }

  function spawnPickup() {
    const { x0, x1 } = roadBounds();
    const kind = Math.random() < 0.78 ? 'scrap' : 'repair';
    game.pickups.push({ kind, x: rand(x0 + 30, x1 - 30), y: -30, w: 22, h: 22, t: 0 });
  }

  function emitParticles(x, y, n, opts = {}) {
    n = Math.max(1, Math.round(n * PARTICLE_SCALE));
    const { color = '#f5d76e', speed = 180, life = 0.6, size = 3, spread = Math.PI * 2 } = opts;
    for (let i = 0; i < n; i++) {
      const ang = rand(0, spread) - (spread === Math.PI * 2 ? 0 : spread/2 - Math.PI/2);
      const sp = rand(speed * 0.3, speed);
      game.particles.push({
        x, y,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        life, max: life,
        size: size * rand(0.6, 1.2),
        color,
      });
    }
  }

  function update(dt) {
    game.t += dt;

    game.level = 1 + Math.floor(game.distance / 1500);
    game.targetSpeed = 280 + Math.min(420, game.level * 28);
    game.speed += (game.targetSpeed - game.speed) * Math.min(1, dt * 0.8);

    if (game.state !== 'playing' || game.paused) return;

    if (game.hintTime > 0) game.hintTime -= dt;

    game.distance += game.speed * dt;
    game.score += game.speed * dt * 0.05;
    game.laneOffset = (game.laneOffset + game.speed * dt) % 60;
    game.shake = Math.max(0, game.shake - dt * 2.4);
    game.flash = Math.max(0, game.flash - dt * 3);

    readKbd();
    const accel = 1800;
    const maxV = 460;
    const drag = 6.5;
    const { x0, x1 } = roadBounds();

    for (const p of game.players.slice(0, playerCount())) {
      if (!p.alive) continue;
      const pi = input.players[p.id];
      if (pi.left)  p.vx -= accel * dt;
      if (pi.right) p.vx += accel * dt;
      if (!pi.left && !pi.right) {
        if (pi.touchTargetX !== null) {
          const target = clamp(pi.touchTargetX, 0, W);
          const dx = target - p.x;
          const desiredV = clamp(dx * 14, -maxV, maxV);
          p.vx += (desiredV - p.vx) * Math.min(1, 18 * dt);
        } else {
          p.vx -= p.vx * Math.min(1, drag * dt);
        }
      }
      p.vx = clamp(p.vx, -maxV, maxV);
      p.x += p.vx * dt;
      if (p.x - p.w/2 < x0 + 4) { p.x = x0 + 4 + p.w/2; p.vx *= -0.4; }
      if (p.x + p.w/2 > x1 - 4) { p.x = x1 - 4 - p.w/2; p.vx *= -0.4; }
      p.y = H - 110 - (playerCount() > 1 ? p.id * 18 : 0);

      p.fireCooldown -= dt;
      if (pi.fire && p.fireCooldown <= 0) {
        const spread = game.mode === 'pvp' ? PVP_BULLET_SPREAD : DEFAULT_BULLET_SPREAD;
        game.bullets.push({ x: p.x - spread, y: p.y - 26, w: 4, h: 12, vy: -780, owner:p.id, color:p.color.glow });
        game.bullets.push({ x: p.x + spread, y: p.y - 26, w: 4, h: 12, vy: -780, owner:p.id, color:p.color.glow });
        p.fireCooldown = 0.18;
        SFX.shoot();
        emitParticles(p.x, p.y - 30, 3, { color:p.color.glow, speed: 80, life: 0.18, size: 2, spread: Math.PI/3 });
      }
    }
    game.health = Math.max(0, ...game.players.slice(0, playerCount()).map(p => p.health));

    for (let i = game.bullets.length - 1; i >= 0; i--) {
      const b = game.bullets[i];
      b.y += b.vy * dt;
      if (b.y < -20 || b.y > H + 20) game.bullets.splice(i,1);
    }
    if (game.mode === 'pvp') {
      for (let i = game.bullets.length - 1; i >= 0; i--) {
        const b = game.bullets[i];
        const target = activePlayers().find(p => p.id !== b.owner && aabb(p, b));
        if (target) {
          const shooter = game.players[b.owner];
          game.bullets.splice(i,1);
          damagePlayer(12, target, shooter);
          emitParticles(b.x, b.y, 8, { color:b.color || '#fff3b0', speed: 220, life: 0.28, size: 2 });
        }
      }
    }
    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const b = game.enemyBullets[i];
      b.y += b.vy * dt;
      b.x += (b.vx || 0) * dt;
      if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) game.enemyBullets.splice(i,1);
    }

    for (let i = game.obstacles.length - 1; i >= 0; i--) {
      const o = game.obstacles[i];
      o.y += game.speed * dt;
      if (o.y > H + 80) { game.obstacles.splice(i,1); continue; }

      if (o.kind === 'barrel') {
        for (let j = game.bullets.length - 1; j >= 0; j--) {
          const b = game.bullets[j];
          if (aabb(o, b)) {
            game.bullets.splice(j,1);
            o.hp--;
            if (o.hp <= 0) {
              SFX.explode();
              emitParticles(o.x, o.y, 26, { color:'#ff8a3d', speed: 320, life: 0.7, size: 4 });
              emitParticles(o.x, o.y, 12, { color:'#ffd86b', speed: 220, life: 0.5, size: 3 });
              game.shake = Math.max(game.shake, 0.5);
              game.score += 50;
              splashDamage(o.x, o.y, 70, 1);
              game.obstacles.splice(i,1);
              break;
            }
          }
        }
      }

      if (game.obstacles[i]) {
        for (const p of activePlayers()) {
          if (aabb(o, p)) {
            damagePlayer(o.kind === 'barrel' ? 18 : 35, p);
            emitParticles(o.x, o.y, 14, { color:'#aaa', speed: 240, life: 0.5 });
            if (o.kind === 'barrel') { SFX.explode(); splashDamage(o.x, o.y, 70, 1); }
            game.obstacles.splice(i,1);
            game.shake = Math.max(game.shake, 0.6);
            break;
          }
        }
      }
    }

    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      e.y += (e.vy + game.speed * 0.15) * dt;
      e.x += e.vx * dt;
      const { x0:rx0, x1:rx1 } = roadBounds();
      if (e.x < rx0 + 24) { e.x = rx0 + 24; e.vx = Math.abs(e.vx); }
      if (e.x > rx1 - 24) { e.x = rx1 - 24; e.vx = -Math.abs(e.vx); }
      e.fireT -= dt;
      if (e.fireT <= 0 && e.y > 0 && e.y < H * 0.7) {
        const target = nearestPlayer(e.x, e.y);
        if (!target) continue;
        const dx = target.x - e.x, dy = target.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
        const sp = 360;
        game.enemyBullets.push({ x: e.x, y: e.y + 20, w: 5, h: 10, vx: dx/dist*sp, vy: dy/dist*sp });
        e.fireT = rand(1.2, 2.2);
      }

      for (let j = game.bullets.length - 1; j >= 0; j--) {
        const b = game.bullets[j];
        if (aabb(e, b)) {
          game.bullets.splice(j,1);
          e.hp--;
          emitParticles(b.x, b.y, 6, { color:'#ffd86b', speed: 200, life: 0.3, size: 2 });
          if (e.hp <= 0) {
            SFX.explode();
            emitParticles(e.x, e.y, 30, { color:'#ff6a2b', speed: 360, life: 0.8, size: 4 });
            emitParticles(e.x, e.y, 14, { color:'#ffe07a', speed: 240, life: 0.6, size: 3 });
            game.score += 150;
            game.shake = Math.max(game.shake, 0.5);
            if (Math.random() < 0.35) game.pickups.push({ kind:'scrap', x:e.x, y:e.y, w:22, h:22, t:0 });
            game.enemies.splice(i,1);
            break;
          } else { SFX.hit(); }
        }
      }
      if (!game.enemies[i]) continue;

      const rammed = activePlayers().find(p => aabb(e, p));
      if (rammed) {
        damagePlayer(40, rammed);
        SFX.explode();
        emitParticles(e.x, e.y, 24, { color:'#ff6a2b', speed: 320, life: 0.7, size: 4 });
        game.enemies.splice(i,1);
        game.shake = Math.max(game.shake, 0.7);
      } else if (e.y > H + 60) game.enemies.splice(i,1);
    }

    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const b = game.enemyBullets[i];
      const target = activePlayers().find(p => aabb(b, p));
      if (target) {
        damagePlayer(8, target);
        emitParticles(b.x, b.y, 6, { color:'#ff5050', speed: 180, life: 0.3, size: 2 });
        game.enemyBullets.splice(i,1);
      }
    }

    for (let i = game.pickups.length - 1; i >= 0; i--) {
      const pk = game.pickups[i];
      pk.y += game.speed * dt;
      pk.t += dt;
      if (pk.y > H + 40) { game.pickups.splice(i,1); continue; }
      const collector = activePlayers().find(p => aabb(pk, p));
      if (collector) {
        if (pk.kind === 'scrap') { game.score += 75; collector.score += 75; emitParticles(pk.x, pk.y, 12, { color:'#f5d76e', speed: 220, life: 0.5, size: 3 }); }
        else { collector.health = Math.min(100, collector.health + 30); emitParticles(pk.x, pk.y, 14, { color:'#7af07a', speed: 220, life: 0.5, size: 3 }); }
        SFX.pickup();
        game.pickups.splice(i,1);
      }
    }

    for (let i = game.particles.length - 1; i >= 0; i--) {
      const pr = game.particles[i];
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt + game.speed * dt * 0.4;
      pr.vx *= 0.96; pr.vy *= 0.96;
      pr.life -= dt;
      if (pr.life <= 0) game.particles.splice(i,1);
    }

    for (let i = game.decor.length - 1; i >= 0; i--) {
      const d = game.decor[i];
      d.y += game.speed * dt;
      if (d.y > H + 30) game.decor.splice(i,1);
    }
    while (game.decor.length < 36) game.decor.push(makeDecor());

    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnEnemy();
      const interval = clamp(1.4 - game.level * 0.07, 0.45, 1.4);
      game.spawnTimer = rand(interval * 0.7, interval * 1.2);
    }
    game.pickupTimer -= dt;
    if (game.pickupTimer <= 0) {
      spawnPickup();
      game.pickupTimer = rand(2.6, 4.6);
    }

    for (const p of activePlayers()) {
      if (Math.random() < 0.6) {
        emitParticles(p.x - 10 + rand(-2,2), p.y + p.h/2 - 4, 1, { color:'rgba(80,60,40,0.6)', speed: 30, life: 0.5, size: 4, spread: Math.PI/4 });
        emitParticles(p.x + 10 + rand(-2,2), p.y + p.h/2 - 4, 1, { color:'rgba(80,60,40,0.6)', speed: 30, life: 0.5, size: 4, spread: Math.PI/4 });
      }
    }
  }

  function damagePlayer(amt, player = game.player, attacker = null) {
    if (!player || !player.alive) return;
    player.health -= amt;
    game.health = Math.max(0, ...game.players.slice(0, playerCount()).map(p => p.health));
    game.flash = 1;
    SFX.hit();
    if (player.health <= 0) {
      player.health = 0;
      player.alive = false;
      if (attacker && attacker !== player) {
        attacker.kos++;
        attacker.score += 500;
        game.score += 500;
      }
      SFX.death();
      emitParticles(player.x, player.y, 60, { color:'#ff6a2b', speed: 420, life: 1.0, size: 5 });
      emitParticles(player.x, player.y, 30, { color:player.color.glow, speed: 320, life: 0.8, size: 4 });
      game.shake = 1.2;
      const alive = activePlayers();
      if (alive.length === 0 || game.mode === 'solo' || game.mode === 'pvp') {
        game.winner = game.mode === 'pvp' ? (alive.length === 1 ? alive[0] : null) : null;
        game.state = 'gameover';
        releaseWakeLock();
        fsBtn.classList.remove('hidden');
        const finalScore = Math.floor(game.score);
        if (finalScore > game.best) {
          game.best = finalScore;
          try { localStorage.setItem('mojaveRunBest', String(finalScore)); } catch(e){}
        }
      }
    }
  }

  function splashDamage(x, y, r, dmg) {
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      if (Math.hypot(e.x - x, e.y - y) < r) {
        e.hp -= dmg;
        if (e.hp <= 0) {
          SFX.explode();
          emitParticles(e.x, e.y, 22, { color:'#ff6a2b', speed: 320, life: 0.7, size: 4 });
          game.score += 120;
          game.enemies.splice(i,1);
        }
      }
    }
    for (let i = game.obstacles.length - 1; i >= 0; i--) {
      const o = game.obstacles[i];
      if (!o) continue;
      if (o.kind === 'barrel' && Math.hypot(o.x - x, o.y - y) < r) {
        emitParticles(o.x, o.y, 18, { color:'#ff8a3d', speed: 280, life: 0.6, size: 4 });
        game.obstacles.splice(i,1);
        game.score += 30;
      }
    }
    for (const p of activePlayers()) {
      if (Math.hypot(p.x - x, p.y - y) < r * 0.7) damagePlayer(10, p);
    }
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#12090b');
    g.addColorStop(0.2, '#3a160f');
    g.addColorStop(0.55, '#70401b');
    g.addColorStop(1, '#9b6730');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    const sun = ctx.createRadialGradient(W * 0.72, H * 0.18, 8, W * 0.72, H * 0.18, Math.min(W,H) * 0.22);
    sun.addColorStop(0, 'rgba(255,238,160,0.95)');
    sun.addColorStop(0.45, 'rgba(255,136,58,0.35)');
    sun.addColorStop(1, 'rgba(255,136,58,0)');
    ctx.fillStyle = sun;
    ctx.fillRect(0, 0, W, H * 0.48);

    ctx.fillStyle = 'rgba(255,226,150,0.45)';
    for (let i = 0; i < 28; i++) {
      const x = (i * 97 + Math.floor(game.distance * 0.02)) % W;
      const y = 18 + (i * 37) % Math.max(80, H * 0.26);
      ctx.fillRect(x, y, 1, 1);
    }

    ctx.fillStyle = '#2a1808';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.32);
    const seed = Math.floor(game.distance * 0.05);
    for (let i = 0; i <= 16; i++) {
      const x = (i / 16) * W;
      const y = H * 0.32 - 30 - Math.abs(Math.sin(i * 1.7 + seed * 0.1)) * 60;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H * 0.32); ctx.lineTo(W, H * 0.36); ctx.lineTo(0, H * 0.36);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(245,180,90,0.18)';
    ctx.beginPath();
    ctx.arc(W * 0.7, H * 0.22, 90, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawRoad() {
    const { x0, x1, w } = roadBounds();
    ctx.fillStyle = '#3d2510';
    ctx.fillRect(0, 0, x0, H);
    ctx.fillRect(x1, 0, W - x1, H);

    const rg = ctx.createLinearGradient(x0, 0, x1, 0);
    rg.addColorStop(0, '#1f1610');
    rg.addColorStop(0.5, '#2a1d12');
    rg.addColorStop(1, '#1f1610');
    ctx.fillStyle = rg;
    ctx.fillRect(x0, 0, w, H);

    ctx.fillStyle = 'rgba(255,255,255,0.035)';
    for (let y = -40 + (game.laneOffset * 0.65); y < H + 40; y += 42) {
      ctx.fillRect(x0 + w * 0.18, y, w * 0.18, 2);
      ctx.fillRect(x0 + w * 0.58, y + 17, w * 0.24, 2);
    }

    const shoulder = ctx.createLinearGradient(x0, 0, x0 + 30, 0);
    shoulder.addColorStop(0, 'rgba(245,215,110,0.25)');
    shoulder.addColorStop(1, 'rgba(245,215,110,0)');
    ctx.fillStyle = shoulder;
    ctx.fillRect(x0, 0, 32, H);
    const shoulderR = ctx.createLinearGradient(x1 - 30, 0, x1, 0);
    shoulderR.addColorStop(0, 'rgba(245,215,110,0)');
    shoulderR.addColorStop(1, 'rgba(245,215,110,0.25)');
    ctx.fillStyle = shoulderR;
    ctx.fillRect(x1 - 32, 0, 32, H);

    ctx.fillStyle = '#f5d76e';
    ctx.fillRect(x0 - 2, 0, 3, H);
    ctx.fillRect(x1 - 1, 0, 3, H);

    ctx.fillStyle = 'rgba(245,215,110,0.65)';
    const cx = (x0 + x1) / 2;
    const dashH = 28, gap = 32;
    for (let y = -gap + game.laneOffset; y < H + gap; y += dashH + gap) {
      ctx.fillRect(cx - 3, y, 6, dashH);
    }
  }

  function drawDecor() {
    for (const d of game.decor) {
      if (d.type === 'rock') {
        ctx.fillStyle = `rgba(${Math.floor(60*d.tone)},${Math.floor(40*d.tone)},${Math.floor(24*d.tone)},1)`;
        ctx.beginPath();
        ctx.ellipse(d.x, d.y, d.size, d.size * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        ctx.ellipse(d.x + d.size * 0.4, d.y + d.size * 0.3, d.size * 0.6, d.size * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#3a5a2a';
        ctx.fillRect(d.x - 3, d.y - d.size, 6, d.size);
        ctx.fillRect(d.x - 3 - 7, d.y - d.size * 0.7, 6, d.size * 0.4);
        ctx.fillRect(d.x + 3, d.y - d.size * 0.55, 6, d.size * 0.35);
      }
    }
  }

  function drawPlayer(p = game.player) {
    if (!p) return;
    ctx.save();
    ctx.translate(p.x, p.y);
    if (!p.alive) ctx.globalAlpha = 0.45;
    const tilt = clamp(p.vx / 460, -1, 1) * 0.18;
    ctx.rotate(tilt);

    ctx.shadowColor = p.color.glow;
    ctx.shadowBlur = p.alive ? 12 : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(-p.w/2 + 4, -p.h/2 + 6, p.w, p.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = p.alive ? p.color.body : '#3b3129';
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.fillStyle = p.alive ? p.color.hood : '#211a16';
    ctx.fillRect(-p.w/2 + 3, -p.h/2, p.w - 6, 12);
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(-p.w/2 + 6, -p.h/2 + 16, p.w - 12, 22);
    ctx.fillStyle = p.alive ? p.color.glass : '#5d5148';
    ctx.fillRect(-p.w/2 + 8, -p.h/2 + 18, p.w - 16, 6);
    ctx.strokeStyle = p.color.glow;
    ctx.lineWidth = 2;
    ctx.strokeRect(-p.w/2 + 5, -p.h/2 + 14, p.w - 10, 26);
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(-p.w/2 + 4, -p.h/2 - 2, p.w - 8, 4);
    ctx.fillStyle = p.alive ? '#ffe07a' : '#553322';
    ctx.fillRect(-p.w/2 + 2, -p.h/2 - 4, 6, 4);
    ctx.fillRect( p.w/2 - 8, -p.h/2 - 4, 6, 4);
    ctx.fillStyle = '#0d0805';
    ctx.fillRect(-p.w/2 - 4, -p.h/2 + 8, 6, 14);
    ctx.fillRect( p.w/2 - 2, -p.h/2 + 8, 6, 14);
    ctx.fillRect(-p.w/2 - 4,  p.h/2 - 22, 6, 16);
    ctx.fillRect( p.w/2 - 2,  p.h/2 - 22, 6, 16);
    if (p.alive) {
      ctx.fillStyle = 'rgba(255,140,60,0.75)';
      ctx.fillRect(-10, p.h/2 - 4, 6, 4);
      ctx.fillRect(  4, p.h/2 - 4, 6, 4);
      ctx.fillStyle = p.color.glow;
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.color.name, 0, 4);
    } else {
      ctx.strokeStyle = '#ff6a2b';
      ctx.beginPath();
      ctx.moveTo(-15, -18); ctx.lineTo(15, 18);
      ctx.moveTo(15, -18); ctx.lineTo(-15, 18);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawObstacle(o) {
    if (o.kind === 'wreck') {
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(-o.w/2 + 3, -o.h/2 + 4, o.w, o.h);
      ctx.fillStyle = '#5a4030';
      ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(-o.w/2 + 4, -o.h/2 + 14, o.w - 8, 22);
      ctx.fillStyle = '#1a0f08';
      ctx.fillRect(-o.w/2 + 6, -o.h/2 + 4, 8, 6);
      ctx.fillRect( o.w/2 - 14, -o.h/2 + 24, 10, 8);
      ctx.fillStyle = '#0d0805';
      ctx.fillRect(-o.w/2 - 3, -o.h/2 + 10, 5, 12);
      ctx.fillRect( o.w/2 - 2, -o.h/2 + 10, 5, 12);
      ctx.restore();
    } else if (o.kind === 'barrel') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(o.x - o.w/2 + 2, o.y - o.h/2 + 3, o.w, o.h);
      ctx.fillStyle = '#c25a2b';
      ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
      ctx.fillStyle = '#1a0f08';
      ctx.fillRect(o.x - o.w/2, o.y - 4, o.w, 2);
      ctx.fillRect(o.x - o.w/2, o.y + 4, o.w, 2);
      ctx.fillStyle = '#ffd86b';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('!', o.x, o.y);
    }
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(-e.w/2 + 3, -e.h/2 + 5, e.w, e.h);
    ctx.fillStyle = '#7a1a1a';
    ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
    ctx.fillStyle = '#1a0f08';
    ctx.beginPath();
    ctx.moveTo(-e.w/2, e.h/2);
    ctx.lineTo(0, e.h/2 + 10);
    ctx.lineTo(e.w/2, e.h/2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#3a0a0a';
    ctx.fillRect(-e.w/2 + 5, -e.h/2 + 14, e.w - 10, 20);
    ctx.fillStyle = '#ff5050';
    ctx.fillRect(-e.w/2 + 8, -e.h/2 + 18, e.w - 16, 5);
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(-3, e.h/2 - 4, 6, 10);
    ctx.fillStyle = '#0d0805';
    ctx.fillRect(-e.w/2 - 3, -e.h/2 + 8, 5, 12);
    ctx.fillRect( e.w/2 - 2, -e.h/2 + 8, 5, 12);
    ctx.fillRect(-e.w/2 - 3,  e.h/2 - 18, 5, 14);
    ctx.fillRect( e.w/2 - 2,  e.h/2 - 18, 5, 14);
    ctx.restore();
  }

  function drawPickup(pk) {
    const bob = Math.sin(pk.t * 6) * 2;
    if (pk.kind === 'scrap') {
      ctx.save();
      ctx.translate(pk.x, pk.y + bob);
      ctx.rotate(pk.t * 2);
      ctx.fillStyle = '#f5d76e';
      ctx.beginPath();
      ctx.moveTo(0, -10); ctx.lineTo(10, 0); ctx.lineTo(0, 10); ctx.lineTo(-10, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#a8731a';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
    } else {
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(pk.x - 11, pk.y + bob - 11, 22, 22);
      ctx.fillStyle = '#7af07a';
      ctx.fillRect(pk.x - 9, pk.y + bob - 9, 18, 18);
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(pk.x - 2, pk.y + bob - 7, 4, 14);
      ctx.fillRect(pk.x - 7, pk.y + bob - 2, 14, 4);
    }
  }

  function drawBullets() {
    for (const b of game.bullets) {
      ctx.shadowColor = b.color || '#fff3b0';
      ctx.shadowBlur = 8;
      ctx.fillStyle = b.color || '#fff3b0';
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      ctx.fillStyle = 'rgba(255,180,80,0.4)';
      ctx.fillRect(b.x - b.w/2 - 1, b.y - b.h/2 - 4, b.w + 2, 4);
    }
    ctx.shadowBlur = 0;
    for (const b of game.enemyBullets) {
      ctx.fillStyle = '#ff5050';
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      ctx.fillStyle = 'rgba(255,80,80,0.5)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles() {
    for (const pr of game.particles) {
      const a = Math.max(0, pr.life / pr.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = pr.color;
      ctx.shadowColor = pr.color;
      ctx.shadowBlur = pr.size * 1.5;
      ctx.beginPath();
      ctx.arc(pr.x, pr.y, pr.size * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawHUD() {
    const hudH = W < 500 ? 48 : 56;
    const fs = W < 500 ? 13 : 16;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, hudH);
    ctx.fillStyle = '#f5d76e';
    ctx.font = `bold ${fs}px "Courier New", monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('SCORE  ' + String(Math.floor(game.score)).padStart(6, '0'), 12, hudH * 0.32);
    ctx.fillStyle = 'rgba(245,215,110,0.7)';
    ctx.font = `bold ${fs - 2}px "Courier New", monospace`;
    ctx.fillText('BEST   ' + String(game.best).padStart(6, '0'), 12, hudH * 0.72);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#f5d76e';
    ctx.font = `bold ${fs}px "Courier New", monospace`;
    ctx.fillText('SECTOR ' + game.level, W - 12, hudH * 0.32);
    ctx.fillStyle = 'rgba(245,215,110,0.7)';
    ctx.font = `bold ${fs - 2}px "Courier New", monospace`;
    ctx.fillText(Math.floor(game.distance) + ' M', W - 12, hudH * 0.72);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff3b0';
    ctx.font = 'bold 9px "Courier New", monospace';
    ctx.fillText(MODE_LABELS[game.mode], W/2, hudH - 8);

    const bars = game.players.slice(0, playerCount());
    const barCfg = HUD_BAR[game.mode];
    const hbW = Math.min(barCfg.width, W * barCfg.frac);
    const hbH = 10;
    const gap = game.mode === 'solo' ? 0 : 12;
    const totalW = bars.length * hbW + (bars.length - 1) * gap;
    const startX = (W - totalW) / 2;
    for (let i = 0; i < bars.length; i++) {
      const p = bars[i];
      const hbX = startX + i * (hbW + gap), hbY = hudH * 0.36 - hbH/2;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(hbX - 2, hbY - 2, hbW + 4, hbH + 4);
      ctx.fillStyle = '#3a1a0a';
      ctx.fillRect(hbX, hbY, hbW, hbH);
      const pct = clamp(p.health / 100, 0, 1);
      const col = pct > 0.5 ? '#7af07a' : pct > 0.25 ? '#f5d76e' : '#ff5050';
      ctx.fillStyle = p.alive ? col : '#553322';
      ctx.fillRect(hbX, hbY, hbW * pct, hbH);
      ctx.strokeStyle = p.color.glow;
      ctx.lineWidth = 1;
      ctx.strokeRect(hbX, hbY, hbW, hbH);
      ctx.fillStyle = p.color.glow;
      ctx.font = 'bold 9px "Courier New", monospace';
      ctx.fillText(`${p.color.name} ${Math.ceil(p.health)}${game.mode === 'pvp' ? ' KO '+p.kos : ''}`, hbX + hbW/2, hbY + hbH + 10);
    }
  }

  function drawTitle() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const titleSize = Math.min(72, W * 0.13);
    ctx.fillStyle = '#1a0f08';
    ctx.font = `bold ${titleSize}px "Courier New", monospace`;
    ctx.fillText('MOJAVE RUN', W/2 + 4, H * 0.30 + 4);
    ctx.fillStyle = '#f5d76e';
    ctx.fillText('MOJAVE RUN', W/2, H * 0.30);

    ctx.fillStyle = 'rgba(245,215,110,0.85)';
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.fillText('A WASTELAND ARCADE DRIVER', W/2, H * 0.30 + titleSize * 0.7);

    ctx.fillStyle = '#fff3b0';
    ctx.font = '13px "Courier New", monospace';
    const lines = IS_TOUCH ? [
      '',
      game.mode === 'solo' ? 'DRAG TO STEER' : 'LEFT SIDE P1 · RIGHT SIDE P2',
      game.mode === 'pvp' ? 'HOLD TO FIRE · LAST TRUCK WINS' : 'HOLD TO FIRE',
      '',
      'COLLECT SCRAP   //   AVOID WRECKS',
      'SHOOT BARRELS   //   CHAIN BOOMS',
      '',
    ] : [
      '',
      game.mode === 'solo' ? '◄ ►   /   A D     STEER' : 'P1 A/D + SPACE    P2 ◄/► + ENTER',
      game.mode === 'pvp' ? 'DUEL WHILE THE ROAD FIGHTS BACK' : 'CO-OP SHARED SCORE',
      '',
      'COLLECT SCRAP   //   AVOID WRECKS',
      'SHOOT BARRELS   //   CHAIN BOOMS',
      '',
    ];
    let y = H * 0.5;
    for (const l of lines) { ctx.fillText(l, W/2, y); y += 20; }

    const modeRect = modeSelectorRect();
    const modeY = modeRect.y;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(W/2 - modeRect.halfW, modeY - 24, modeRect.width, 48);
    ctx.strokeStyle = '#f5d76e';
    ctx.strokeRect(W/2 - modeRect.halfW, modeY - 24, modeRect.width, 48);
    ctx.fillStyle = game.mode === 'pvp' ? '#68d9ff' : '#f5d76e';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText('MODE: ' + MODE_LABELS[game.mode], W/2, modeY - 4);
    ctx.fillStyle = 'rgba(245,215,110,0.65)';
    ctx.font = '9px "Courier New", monospace';
    ctx.fillText(IS_TOUCH ? 'TAP HERE TO SWITCH' : 'M/C OR 1-3 TO SWITCH', W/2, modeY + 14);
    y = Math.max(y, modeY + 38);

    if (game.best > 0) {
      ctx.fillStyle = 'rgba(245,215,110,0.7)';
      ctx.fillText('BEST   ' + String(game.best).padStart(6, '0'), W/2, y + 6);
      y += 26;
    }

    const blink = Math.floor(game.t * 2) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#f5d76e';
      ctx.font = 'bold 14px "Courier New", monospace';
      ctx.fillText(IS_TOUCH ? 'TAP TO START' : 'PRESS SPACE TO START', W/2, y + 22);
    }

    ctx.fillStyle = 'rgba(245,215,110,0.4)';
    ctx.font = '9px "Courier New", monospace';
    ctx.fillText('1COMMERCE  //  PNW WASTELAND DIV.', W/2, H - 14);
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(20,8,4,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const titleSize = Math.min(56, W * 0.11);
    ctx.fillStyle = '#1a0f08';
    ctx.font = `bold ${titleSize}px "Courier New", monospace`;
    ctx.fillText('YOU DIED', W/2 + 3, H * 0.34 + 3);
    ctx.fillStyle = '#ff5050';
    ctx.fillText('YOU DIED', W/2, H * 0.34);

    ctx.fillStyle = '#f5d76e';
    ctx.font = 'bold 18px "Courier New", monospace';
    const headline = game.mode === 'pvp' && game.winner ? `${game.winner.color.name} WINS` : 'SCORE   ' + String(Math.floor(game.score)).padStart(6, '0');
    ctx.fillText(headline, W/2, H * 0.5);
    ctx.fillStyle = 'rgba(245,215,110,0.8)';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText(game.mode === 'pvp' ? `P1 KO ${game.players[0].kos}   P2 KO ${game.players[1].kos}` : 'BEST    ' + String(game.best).padStart(6, '0'), W/2, H * 0.5 + 26);
    ctx.fillText('SECTOR  ' + game.level, W/2, H * 0.5 + 48);
    ctx.fillText('DISTANCE ' + Math.floor(game.distance) + ' M', W/2, H * 0.5 + 70);

    const blink = Math.floor(game.t * 2) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#f5d76e';
      ctx.font = 'bold 13px "Courier New", monospace';
      ctx.fillText(IS_TOUCH ? 'TAP TO RUN AGAIN' : 'PRESS R TO RUN AGAIN', W/2, H * 0.5 + 110);
    }
  }

  function drawPause() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f5d76e';
    ctx.font = 'bold 36px "Courier New", monospace';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '12px "Courier New", monospace';
    ctx.fillStyle = 'rgba(245,215,110,0.7)';
    ctx.fillText(IS_TOUCH ? 'TAP TO RESUME' : 'PRESS P TO RESUME', W/2, H/2 + 32);
  }

  function render() {
    ctx.save();
    if (game.shake > 0 && !game.paused) {
      const s = game.shake * 14;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }
    drawBackground();
    drawRoad();
    drawDecor();

    for (const o of game.obstacles) drawObstacle(o);
    for (const e of game.enemies) drawEnemy(e);
    for (const pk of game.pickups) drawPickup(pk);
    drawBullets();
    if (game.state === 'playing' || game.state === 'gameover') {
      for (const p of game.players.slice(0, playerCount())) drawPlayer(p);
    }
    drawParticles();

    if (game.flash > 0) {
      ctx.fillStyle = `rgba(255,80,80,${game.flash * 0.4})`;
      ctx.fillRect(0, 0, W, H);
    }
    ctx.restore();

    const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    if (game.state === 'playing') drawHUD();
    if (game.state === 'title') drawTitle();
    if (game.state === 'gameover') { drawHUD(); drawGameOver(); }
    if (game.state === 'playing' && game.paused) drawPause();
  }

  const hintEl = document.getElementById('hint');
  let hintShown = false;
  function updateHint() {
    if (game.state === 'playing' && game.hintTime > 0 && IS_TOUCH) {
      if (!hintShown) { hintEl.classList.add('show'); hintShown = true; }
    } else {
      if (hintShown) { hintEl.classList.remove('show'); hintShown = false; }
    }
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    updateHint();
    requestAnimationFrame(frame);
  }

  resize();
  game.players = [makePlayer(0), makePlayer(1)];
  game.player = game.players[0];
  positionPlayers();
  for (let i = 0; i < 36; i++) game.decor.push(makeDecor(Math.random() * H));
  requestAnimationFrame(frame);

  ['pointerdown','keydown','touchstart'].forEach(ev =>
    document.addEventListener(ev, ensureAudio, { once:false, passive:true })
  );
})();
</script>
</body>
</html>
