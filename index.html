<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a0f08" />
<title>MOJAVE RUN</title>
<meta name="description" content="A wasteland arcade driver. Survive the Mojave." />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#f5d76e;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
  body{display:flex;align-items:center;justify-content:center}
  #wrap{position:relative;width:100vw;height:100vh}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;background:#1a0f08}
  #touch{position:absolute;inset:0;display:none;pointer-events:none}
  .pad{position:absolute;bottom:24px;width:84px;height:84px;border:2px solid rgba(245,215,110,.35);border-radius:50%;background:rgba(0,0,0,.35);pointer-events:auto;display:flex;align-items:center;justify-content:center;color:#f5d76e;font-size:32px;font-weight:bold;backdrop-filter:blur(4px)}
  #padL{left:18px}#padR{left:118px}#padFire{right:18px;width:108px;height:108px;font-size:18px}
  .pad:active{background:rgba(245,215,110,.18)}
  @media (hover:none) and (pointer:coarse){#touch{display:block}}
  #footer{position:absolute;bottom:6px;right:10px;font-size:10px;opacity:.4;letter-spacing:1px;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="touch">
    <div class="pad" id="padL">◄</div>
    <div class="pad" id="padR">►</div>
    <div class="pad" id="padFire">FIRE</div>
  </div>
  <div id="footer">1COMMERCE // MOJAVE RUN v1.0</div>
</div>
<script>
(() => {
  'use strict';

  // ============ CANVAS / RESIZE ============
  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = cvs.clientWidth = window.innerWidth;
    H = cvs.clientHeight = window.innerHeight;
    cvs.width = Math.floor(W * DPR);
    cvs.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize);
  resize();

  // ============ AUDIO (synth, no assets) ============
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function blip(freq, dur, type='square', vol=0.08, slide=0) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + dur);
  }
  function noise(dur, vol=0.12, filterFreq=800) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = filterFreq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f).connect(g).connect(audioCtx.destination);
    src.start(t);
  }
  const SFX = {
    shoot: () => blip(880, 0.06, 'square', 0.05, -300),
    hit:   () => { noise(0.18, 0.18, 1200); blip(120, 0.18, 'sawtooth', 0.06, -60); },
    pickup:() => { blip(660, 0.06, 'triangle', 0.08); setTimeout(()=>blip(990,0.08,'triangle',0.08),50); },
    explode:() => { noise(0.45, 0.25, 600); blip(80, 0.4, 'sawtooth', 0.1, -40); },
    death: () => { blip(220,0.4,'sawtooth',0.12,-180); noise(0.6,0.3,500); },
    start: () => { blip(440,0.08,'square',0.06); setTimeout(()=>blip(660,0.08,'square',0.06),80); setTimeout(()=>blip(880,0.12,'square',0.06),160); },
  };

  // ============ INPUT ============
  const keys = Object.create(null);
  const input = { left:false, right:false, fire:false };
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (['arrowleft','arrowright','arrowup','arrowdown',' '].includes(e.key.toLowerCase())) e.preventDefault();
    ensureAudio();
    if (game.state !== 'playing') {
      if (e.key.toLowerCase() === 'r' || e.key === 'Enter' || e.key === ' ') startGame();
    }
  }, { passive:false });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function readKbd() {
    input.left  = !!(keys['arrowleft']  || keys['a']);
    input.right = !!(keys['arrowright'] || keys['d']);
    input.fire  = !!(keys[' '] || keys['z'] || keys['x']);
  }

  // touch
  function bindPad(id, prop) {
    const el = document.getElementById(id);
    if (!el) return;
    const set = v => () => { input[prop] = v; ensureAudio(); if (game.state !== 'playing' && v) startGame(); };
    el.addEventListener('touchstart', e => { e.preventDefault(); set(true)(); }, { passive:false });
    el.addEventListener('touchend',   e => { e.preventDefault(); set(false)(); }, { passive:false });
    el.addEventListener('mousedown',  set(true));
    el.addEventListener('mouseup',    set(false));
    el.addEventListener('mouseleave', set(false));
  }
  bindPad('padL','left');
  bindPad('padR','right');
  bindPad('padFire','fire');
  cvs.addEventListener('pointerdown', () => { ensureAudio(); if (game.state !== 'playing') startGame(); });

  // ============ GAME STATE ============
  const game = {
    state: 'title', // title | playing | gameover
    t: 0,
    score: 0,
    best: parseInt(localStorage.getItem('mojaveRunBest') || '0', 10) || 0,
    distance: 0,
    speed: 280,            // world scroll px/s
    targetSpeed: 280,
    health: 100,
    fireCooldown: 0,
    spawnTimer: 0,
    pickupTimer: 0,
    shake: 0,
    flash: 0,
    level: 1,
    player: { x:0, y:0, w:42, h:64, vx:0 },
    bullets: [],
    enemies: [],
    obstacles: [],
    pickups: [],
    enemyBullets: [],
    particles: [],
    decor: [],     // sand/rocks on shoulder
    laneOffset: 0, // lane dash scroll
  };

  function resetGame() {
    game.state = 'playing';
    game.t = 0;
    game.score = 0;
    game.distance = 0;
    game.speed = 280;
    game.targetSpeed = 280;
    game.health = 100;
    game.fireCooldown = 0;
    game.spawnTimer = 0.6;
    game.pickupTimer = 3;
    game.shake = 0;
    game.flash = 0;
    game.level = 1;
    game.bullets.length = 0;
    game.enemies.length = 0;
    game.obstacles.length = 0;
    game.pickups.length = 0;
    game.enemyBullets.length = 0;
    game.particles.length = 0;
    game.decor.length = 0;
    game.laneOffset = 0;
    game.player.x = W * 0.5;
    game.player.y = H - 110;
    game.player.vx = 0;
    // pre-seed shoulder decor
    for (let i = 0; i < 30; i++) {
      game.decor.push(makeDecor(Math.random() * H));
    }
  }

  function startGame() {
    ensureAudio();
    SFX.start();
    resetGame();
  }

  // ============ HELPERS ============
  const rand = (a,b) => a + Math.random() * (b - a);
  const irand = (a,b) => Math.floor(rand(a,b+1));
  const clamp = (v,lo,hi) => v < lo ? lo : v > hi ? hi : v;

  function roadBounds() {
    const roadW = Math.min(W * 0.72, 720);
    const x0 = (W - roadW) / 2;
    const x1 = x0 + roadW;
    return { x0, x1, w: roadW };
  }

  function aabb(a, b) {
    return Math.abs(a.x - b.x) * 2 < (a.w + b.w) &&
           Math.abs(a.y - b.y) * 2 < (a.h + b.h);
  }

  function makeDecor(yOverride) {
    const { x0, x1 } = roadBounds();
    const side = Math.random() < 0.5 ? 'L' : 'R';
    const x = side === 'L' ? rand(0, x0 - 8) : rand(x1 + 8, W);
    const y = yOverride !== undefined ? yOverride : -20;
    const type = Math.random() < 0.7 ? 'rock' : 'cactus';
    return {
      x, y, type,
      size: type === 'rock' ? rand(8, 22) : rand(14, 26),
      tone: rand(0.6, 1.0),
    };
  }

  function spawnEnemy() {
    const { x0, x1 } = roadBounds();
    const margin = 32;
    const r = Math.random();
    if (r < 0.45) {
      // raider buggy
      game.enemies.push({
        kind: 'buggy',
        x: rand(x0 + margin, x1 - margin),
        y: -50, w: 40, h: 56,
        vx: rand(-40, 40),
        vy: rand(60, 110),
        hp: 2,
        fireT: rand(0.8, 1.6),
      });
    } else if (r < 0.8) {
      // wrecked car (obstacle, scrolls with road)
      game.obstacles.push({
        kind: 'wreck',
        x: rand(x0 + margin, x1 - margin),
        y: -60, w: 44, h: 64,
        rot: rand(-0.4, 0.4),
      });
    } else {
      // barrel cluster
      const cx = rand(x0 + margin, x1 - margin);
      const n = irand(1, 3);
      for (let i = 0; i < n; i++) {
        game.obstacles.push({
          kind: 'barrel',
          x: cx + (i - (n-1)/2) * 26 + rand(-4,4),
          y: -40 - i * 22,
          w: 22, h: 24,
          hp: 1,
        });
      }
    }
  }

  function spawnPickup() {
    const { x0, x1 } = roadBounds();
    const kind = Math.random() < 0.78 ? 'scrap' : 'repair';
    game.pickups.push({
      kind, x: rand(x0 + 30, x1 - 30), y: -30,
      w: 22, h: 22, t: 0,
    });
  }

  function emitParticles(x, y, n, opts = {}) {
    const { color = '#f5d76e', speed = 180, life = 0.6, size = 3, spread = Math.PI * 2 } = opts;
    for (let i = 0; i < n; i++) {
      const ang = rand(0, spread) - (spread === Math.PI * 2 ? 0 : spread/2 - Math.PI/2);
      const sp = rand(speed * 0.3, speed);
      game.particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life, max: life,
        size: size * rand(0.6, 1.2),
        color,
      });
    }
  }

  // ============ UPDATE ============
  function update(dt) {
    game.t += dt;

    // difficulty ramp
    game.level = 1 + Math.floor(game.distance / 1500);
    game.targetSpeed = 280 + Math.min(420, game.level * 28);
    game.speed += (game.targetSpeed - game.speed) * Math.min(1, dt * 0.8);

    if (game.state !== 'playing') return;

    game.distance += game.speed * dt;
    game.score += game.speed * dt * 0.05;
    game.laneOffset = (game.laneOffset + game.speed * dt) % 60;
    game.shake = Math.max(0, game.shake - dt * 2.4);
    game.flash = Math.max(0, game.flash - dt * 3);

    // ----- player -----
    readKbd();
    const p = game.player;
    const accel = 1800;
    const maxV = 460;
    const drag = 6.5;
    if (input.left)  p.vx -= accel * dt;
    if (input.right) p.vx += accel * dt;
    if (!input.left && !input.right) p.vx -= p.vx * Math.min(1, drag * dt);
    p.vx = clamp(p.vx, -maxV, maxV);
    p.x += p.vx * dt;
    const { x0, x1 } = roadBounds();
    if (p.x - p.w/2 < x0 + 4) { p.x = x0 + 4 + p.w/2; p.vx *= -0.4; }
    if (p.x + p.w/2 > x1 - 4) { p.x = x1 - 4 - p.w/2; p.vx *= -0.4; }
    p.y = H - 110;

    // fire
    game.fireCooldown -= dt;
    if (input.fire && game.fireCooldown <= 0) {
      game.bullets.push({ x: p.x - 10, y: p.y - 26, w: 4, h: 12, vy: -780, owner:'p' });
      game.bullets.push({ x: p.x + 10, y: p.y - 26, w: 4, h: 12, vy: -780, owner:'p' });
      game.fireCooldown = 0.18;
      SFX.shoot();
      emitParticles(p.x, p.y - 30, 3, { color:'#fff3b0', speed: 80, life: 0.18, size: 2, spread: Math.PI/3 });
    }

    // ----- bullets -----
    for (let i = game.bullets.length - 1; i >= 0; i--) {
      const b = game.bullets[i];
      b.y += b.vy * dt;
      if (b.y < -20 || b.y > H + 20) game.bullets.splice(i,1);
    }
    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const b = game.enemyBullets[i];
      b.y += b.vy * dt;
      b.x += (b.vx || 0) * dt;
      if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) game.enemyBullets.splice(i,1);
    }

    // ----- obstacles -----
    for (let i = game.obstacles.length - 1; i >= 0; i--) {
      const o = game.obstacles[i];
      o.y += game.speed * dt;
      if (o.y > H + 80) { game.obstacles.splice(i,1); continue; }

      // bullet hits (barrels destructible)
      if (o.kind === 'barrel') {
        for (let j = game.bullets.length - 1; j >= 0; j--) {
          const b = game.bullets[j];
          if (aabb(o, b)) {
            game.bullets.splice(j,1);
            o.hp--;
            if (o.hp <= 0) {
              SFX.explode();
              emitParticles(o.x, o.y, 26, { color:'#ff8a3d', speed: 320, life: 0.7, size: 4 });
              emitParticles(o.x, o.y, 12, { color:'#ffd86b', speed: 220, life: 0.5, size: 3 });
              game.shake = Math.max(game.shake, 0.5);
              game.score += 50;
              // splash: damage anything nearby
              splashDamage(o.x, o.y, 70, 1);
              game.obstacles.splice(i,1);
              break;
            }
          }
        }
      }

      // collide with player
      if (game.obstacles[i] && aabb(o, game.player)) {
        damagePlayer(o.kind === 'barrel' ? 18 : 35);
        emitParticles(o.x, o.y, 14, { color:'#aaa', speed: 240, life: 0.5 });
        if (o.kind === 'barrel') {
          SFX.explode();
          splashDamage(o.x, o.y, 70, 1);
        }
        game.obstacles.splice(i,1);
        game.shake = Math.max(game.shake, 0.6);
      }
    }

    // ----- enemies -----
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      e.y += (e.vy + game.speed * 0.15) * dt;
      e.x += e.vx * dt;
      const { x0:rx0, x1:rx1 } = roadBounds();
      if (e.x < rx0 + 24) { e.x = rx0 + 24; e.vx = Math.abs(e.vx); }
      if (e.x > rx1 - 24) { e.x = rx1 - 24; e.vx = -Math.abs(e.vx); }
      e.fireT -= dt;
      if (e.fireT <= 0 && e.y > 0 && e.y < H * 0.7) {
        const dx = game.player.x - e.x, dy = game.player.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
        const sp = 360;
        game.enemyBullets.push({ x: e.x, y: e.y + 20, w: 5, h: 10, vx: dx/dist*sp, vy: dy/dist*sp });
        e.fireT = rand(1.2, 2.2);
      }

      // bullet hits
      for (let j = game.bullets.length - 1; j >= 0; j--) {
        const b = game.bullets[j];
        if (aabb(e, b)) {
          game.bullets.splice(j,1);
          e.hp--;
          emitParticles(b.x, b.y, 6, { color:'#ffd86b', speed: 200, life: 0.3, size: 2 });
          if (e.hp <= 0) {
            SFX.explode();
            emitParticles(e.x, e.y, 30, { color:'#ff6a2b', speed: 360, life: 0.8, size: 4 });
            emitParticles(e.x, e.y, 14, { color:'#ffe07a', speed: 240, life: 0.6, size: 3 });
            game.score += 150;
            game.shake = Math.max(game.shake, 0.5);
            // 30% chance drop scrap
            if (Math.random() < 0.35) {
              game.pickups.push({ kind:'scrap', x:e.x, y:e.y, w:22, h:22, t:0 });
            }
            game.enemies.splice(i,1);
            break;
          } else {
            SFX.hit();
          }
        }
      }
      if (!game.enemies[i]) continue;

      if (aabb(e, game.player)) {
        damagePlayer(40);
        SFX.explode();
        emitParticles(e.x, e.y, 24, { color:'#ff6a2b', speed: 320, life: 0.7, size: 4 });
        game.enemies.splice(i,1);
        game.shake = Math.max(game.shake, 0.7);
      } else if (e.y > H + 60) {
        game.enemies.splice(i,1);
      }
    }

    // ----- enemy bullets vs player -----
    for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
      const b = game.enemyBullets[i];
      if (aabb(b, game.player)) {
        damagePlayer(8);
        emitParticles(b.x, b.y, 6, { color:'#ff5050', speed: 180, life: 0.3, size: 2 });
        game.enemyBullets.splice(i,1);
      }
    }

    // ----- pickups -----
    for (let i = game.pickups.length - 1; i >= 0; i--) {
      const pk = game.pickups[i];
      pk.y += game.speed * dt;
      pk.t += dt;
      if (pk.y > H + 40) { game.pickups.splice(i,1); continue; }
      if (aabb(pk, game.player)) {
        if (pk.kind === 'scrap') { game.score += 75; emitParticles(pk.x, pk.y, 12, { color:'#f5d76e', speed: 220, life: 0.5, size: 3 }); }
        else { game.health = Math.min(100, game.health + 30); emitParticles(pk.x, pk.y, 14, { color:'#7af07a', speed: 220, life: 0.5, size: 3 }); }
        SFX.pickup();
        game.pickups.splice(i,1);
      }
    }

    // ----- particles -----
    for (let i = game.particles.length - 1; i >= 0; i--) {
      const pr = game.particles[i];
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt + game.speed * dt * 0.4;
      pr.vx *= 0.96; pr.vy *= 0.96;
      pr.life -= dt;
      if (pr.life <= 0) game.particles.splice(i,1);
    }

    // ----- decor -----
    for (let i = game.decor.length - 1; i >= 0; i--) {
      const d = game.decor[i];
      d.y += game.speed * dt;
      if (d.y > H + 30) game.decor.splice(i,1);
    }
    while (game.decor.length < 36) game.decor.push(makeDecor());

    // ----- spawning -----
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnEnemy();
      const interval = clamp(1.4 - game.level * 0.07, 0.45, 1.4);
      game.spawnTimer = rand(interval * 0.7, interval * 1.2);
    }
    game.pickupTimer -= dt;
    if (game.pickupTimer <= 0) {
      spawnPickup();
      game.pickupTimer = rand(2.6, 4.6);
    }

    // engine smoke trail
    if (Math.random() < 0.6) {
      emitParticles(p.x - 10 + rand(-2,2), p.y + p.h/2 - 4, 1, { color:'rgba(80,60,40,0.6)', speed: 30, life: 0.5, size: 4, spread: Math.PI/4 });
      emitParticles(p.x + 10 + rand(-2,2), p.y + p.h/2 - 4, 1, { color:'rgba(80,60,40,0.6)', speed: 30, life: 0.5, size: 4, spread: Math.PI/4 });
    }
  }

  function damagePlayer(amt) {
    game.health -= amt;
    game.flash = 1;
    SFX.hit();
    if (game.health <= 0) {
      game.health = 0;
      game.state = 'gameover';
      SFX.death();
      emitParticles(game.player.x, game.player.y, 60, { color:'#ff6a2b', speed: 420, life: 1.0, size: 5 });
      emitParticles(game.player.x, game.player.y, 30, { color:'#ffd86b', speed: 320, life: 0.8, size: 4 });
      game.shake = 1.2;
      const finalScore = Math.floor(game.score);
      if (finalScore > game.best) {
        game.best = finalScore;
        try { localStorage.setItem('mojaveRunBest', String(finalScore)); } catch(e){}
      }
    }
  }

  function splashDamage(x, y, r, dmg) {
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      if (Math.hypot(e.x - x, e.y - y) < r) {
        e.hp -= dmg;
        if (e.hp <= 0) {
          SFX.explode();
          emitParticles(e.x, e.y, 22, { color:'#ff6a2b', speed: 320, life: 0.7, size: 4 });
          game.score += 120;
          game.enemies.splice(i,1);
        }
      }
    }
    for (let i = game.obstacles.length - 1; i >= 0; i--) {
      const o = game.obstacles[i];
      if (o === undefined) continue;
      if (o.kind === 'barrel' && Math.hypot(o.x - x, o.y - y) < r) {
        // chain reaction
        emitParticles(o.x, o.y, 18, { color:'#ff8a3d', speed: 280, life: 0.6, size: 4 });
        game.obstacles.splice(i,1);
        game.score += 30;
      }
    }
    if (Math.hypot(game.player.x - x, game.player.y - y) < r * 0.7) {
      damagePlayer(10);
    }
  }

  // ============ RENDER ============
  function drawBackground() {
    // sand gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#3a230f');
    g.addColorStop(0.4, '#5a3818');
    g.addColorStop(1, '#6e4621');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // distant mountains silhouette
    ctx.fillStyle = '#2a1808';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.32);
    const seed = Math.floor(game.distance * 0.05);
    for (let i = 0; i <= 16; i++) {
      const x = (i / 16) * W;
      const y = H * 0.32 - 30 - Math.abs(Math.sin(i * 1.7 + seed * 0.1)) * 60;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H * 0.32); ctx.lineTo(W, H * 0.36); ctx.lineTo(0, H * 0.36);
    ctx.closePath();
    ctx.fill();

    // sun haze
    ctx.fillStyle = 'rgba(245,180,90,0.18)';
    ctx.beginPath();
    ctx.arc(W * 0.7, H * 0.22, 90, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawRoad() {
    const { x0, x1, w } = roadBounds();
    // shoulder
    ctx.fillStyle = '#3d2510';
    ctx.fillRect(0, 0, x0, H);
    ctx.fillRect(x1, 0, W - x1, H);

    // road
    const rg = ctx.createLinearGradient(x0, 0, x1, 0);
    rg.addColorStop(0, '#1f1610');
    rg.addColorStop(0.5, '#2a1d12');
    rg.addColorStop(1, '#1f1610');
    ctx.fillStyle = rg;
    ctx.fillRect(x0, 0, w, H);

    // edges
    ctx.fillStyle = '#f5d76e';
    ctx.fillRect(x0 - 2, 0, 3, H);
    ctx.fillRect(x1 - 1, 0, 3, H);

    // dashed center line
    ctx.fillStyle = 'rgba(245,215,110,0.65)';
    const cx = (x0 + x1) / 2;
    const dashH = 28, gap = 32;
    for (let y = -gap + game.laneOffset; y < H + gap; y += dashH + gap) {
      ctx.fillRect(cx - 3, y, 6, dashH);
    }
  }

  function drawDecor() {
    for (const d of game.decor) {
      if (d.type === 'rock') {
        ctx.fillStyle = `rgba(${Math.floor(60*d.tone)},${Math.floor(40*d.tone)},${Math.floor(24*d.tone)},1)`;
        ctx.beginPath();
        ctx.ellipse(d.x, d.y, d.size, d.size * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        ctx.ellipse(d.x + d.size * 0.4, d.y + d.size * 0.3, d.size * 0.6, d.size * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // cactus
        ctx.fillStyle = '#3a5a2a';
        ctx.fillRect(d.x - 3, d.y - d.size, 6, d.size);
        ctx.fillRect(d.x - 3 - 7, d.y - d.size * 0.7, 6, d.size * 0.4);
        ctx.fillRect(d.x + 3, d.y - d.size * 0.55, 6, d.size * 0.35);
      }
    }
  }

  function drawPlayer() {
    const p = game.player;
    ctx.save();
    ctx.translate(p.x, p.y);
    const tilt = clamp(p.vx / 460, -1, 1) * 0.18;
    ctx.rotate(tilt);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(-p.w/2 + 4, -p.h/2 + 6, p.w, p.h);

    // body
    ctx.fillStyle = '#a86a2e';
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    // hood
    ctx.fillStyle = '#8a4f1f';
    ctx.fillRect(-p.w/2 + 3, -p.h/2, p.w - 6, 12);
    // cab roof
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(-p.w/2 + 6, -p.h/2 + 16, p.w - 12, 22);
    // windshield
    ctx.fillStyle = '#a8d8e8';
    ctx.fillRect(-p.w/2 + 8, -p.h/2 + 18, p.w - 16, 6);
    // grille
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(-p.w/2 + 4, -p.h/2 - 2, p.w - 8, 4);
    // headlights
    ctx.fillStyle = '#ffe07a';
    ctx.fillRect(-p.w/2 + 2, -p.h/2 - 4, 6, 4);
    ctx.fillRect( p.w/2 - 8, -p.h/2 - 4, 6, 4);
    // wheels
    ctx.fillStyle = '#0d0805';
    ctx.fillRect(-p.w/2 - 4, -p.h/2 + 8, 6, 14);
    ctx.fillRect( p.w/2 - 2, -p.h/2 + 8, 6, 14);
    ctx.fillRect(-p.w/2 - 4,  p.h/2 - 22, 6, 16);
    ctx.fillRect( p.w/2 - 2,  p.h/2 - 22, 6, 16);
    // exhaust glow
    ctx.fillStyle = 'rgba(255,140,60,0.6)';
    ctx.fillRect(-10, p.h/2 - 4, 6, 4);
    ctx.fillRect(  4, p.h/2 - 4, 6, 4);

    ctx.restore();
  }

  function drawObstacle(o) {
    if (o.kind === 'wreck') {
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(-o.w/2 + 3, -o.h/2 + 4, o.w, o.h);
      ctx.fillStyle = '#5a4030';
      ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(-o.w/2 + 4, -o.h/2 + 14, o.w - 8, 22);
      ctx.fillStyle = '#1a0f08';
      // damage
      ctx.fillRect(-o.w/2 + 6, -o.h/2 + 4, 8, 6);
      ctx.fillRect( o.w/2 - 14, -o.h/2 + 24, 10, 8);
      ctx.fillStyle = '#0d0805';
      ctx.fillRect(-o.w/2 - 3, -o.h/2 + 10, 5, 12);
      ctx.fillRect( o.w/2 - 2, -o.h/2 + 10, 5, 12);
      ctx.restore();
    } else if (o.kind === 'barrel') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(o.x - o.w/2 + 2, o.y - o.h/2 + 3, o.w, o.h);
      ctx.fillStyle = '#c25a2b';
      ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
      ctx.fillStyle = '#1a0f08';
      ctx.fillRect(o.x - o.w/2, o.y - 4, o.w, 2);
      ctx.fillRect(o.x - o.w/2, o.y + 4, o.w, 2);
      ctx.fillStyle = '#ffd86b';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('!', o.x, o.y);
    }
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(-e.w/2 + 3, -e.h/2 + 5, e.w, e.h);
    // body (angled, hostile)
    ctx.fillStyle = '#7a1a1a';
    ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
    // spike front
    ctx.fillStyle = '#1a0f08';
    ctx.beginPath();
    ctx.moveTo(-e.w/2, e.h/2);
    ctx.lineTo(0, e.h/2 + 10);
    ctx.lineTo(e.w/2, e.h/2);
    ctx.closePath();
    ctx.fill();
    // cab
    ctx.fillStyle = '#3a0a0a';
    ctx.fillRect(-e.w/2 + 5, -e.h/2 + 14, e.w - 10, 20);
    // windshield (red glow)
    ctx.fillStyle = '#ff5050';
    ctx.fillRect(-e.w/2 + 8, -e.h/2 + 18, e.w - 16, 5);
    // gun
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(-3, e.h/2 - 4, 6, 10);
    // wheels
    ctx.fillStyle = '#0d0805';
    ctx.fillRect(-e.w/2 - 3, -e.h/2 + 8, 5, 12);
    ctx.fillRect( e.w/2 - 2, -e.h/2 + 8, 5, 12);
    ctx.fillRect(-e.w/2 - 3,  e.h/2 - 18, 5, 14);
    ctx.fillRect( e.w/2 - 2,  e.h/2 - 18, 5, 14);
    ctx.restore();
  }

  function drawPickup(pk) {
    const bob = Math.sin(pk.t * 6) * 2;
    if (pk.kind === 'scrap') {
      ctx.save();
      ctx.translate(pk.x, pk.y + bob);
      ctx.rotate(pk.t * 2);
      ctx.fillStyle = '#f5d76e';
      ctx.beginPath();
      ctx.moveTo(0, -10); ctx.lineTo(10, 0); ctx.lineTo(0, 10); ctx.lineTo(-10, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#a8731a';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
    } else {
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(pk.x - 11, pk.y + bob - 11, 22, 22);
      ctx.fillStyle = '#7af07a';
      ctx.fillRect(pk.x - 9, pk.y + bob - 9, 18, 18);
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(pk.x - 2, pk.y + bob - 7, 4, 14);
      ctx.fillRect(pk.x - 7, pk.y + bob - 2, 14, 4);
    }
  }

  function drawBullets() {
    for (const b of game.bullets) {
      ctx.fillStyle = '#fff3b0';
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      ctx.fillStyle = 'rgba(255,180,80,0.4)';
      ctx.fillRect(b.x - b.w/2 - 1, b.y - b.h/2 - 4, b.w + 2, 4);
    }
    for (const b of game.enemyBullets) {
      ctx.fillStyle = '#ff5050';
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      ctx.fillStyle = 'rgba(255,80,80,0.5)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles() {
    for (const pr of game.particles) {
      const a = Math.max(0, pr.life / pr.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = pr.color;
      ctx.fillRect(pr.x - pr.size/2, pr.y - pr.size/2, pr.size, pr.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // top bar
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, 56);
    ctx.fillStyle = '#f5d76e';
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('SCORE  ' + String(Math.floor(game.score)).padStart(6, '0'), 16, 18);
    ctx.fillStyle = 'rgba(245,215,110,0.7)';
    ctx.fillText('BEST   ' + String(game.best).padStart(6, '0'), 16, 38);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#f5d76e';
    ctx.fillText('SECTOR ' + game.level, W - 16, 18);
    ctx.fillStyle = 'rgba(245,215,110,0.7)';
    ctx.fillText(Math.floor(game.distance) + ' M', W - 16, 38);

    // health bar
    const hbW = 200, hbH = 12, hbX = (W - hbW) / 2, hbY = 22;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hbX - 2, hbY - 2, hbW + 4, hbH + 4);
    ctx.fillStyle = '#3a1a0a';
    ctx.fillRect(hbX, hbY, hbW, hbH);
    const pct = clamp(game.health / 100, 0, 1);
    const col = pct > 0.5 ? '#7af07a' : pct > 0.25 ? '#f5d76e' : '#ff5050';
    ctx.fillStyle = col;
    ctx.fillRect(hbX, hbY, hbW * pct, hbH);
    ctx.strokeStyle = '#f5d76e';
    ctx.lineWidth = 1;
    ctx.strokeRect(hbX, hbY, hbW, hbH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff3b0';
    ctx.font = 'bold 10px "Courier New", monospace';
    ctx.fillText('HULL ' + Math.ceil(game.health), W/2, hbY + hbH + 10);
  }

  function drawTitle() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = '#1a0f08';
    ctx.font = 'bold 64px "Courier New", monospace';
    ctx.fillText('MOJAVE RUN', W/2 + 4, H * 0.32 + 4);
    ctx.fillStyle = '#f5d76e';
    ctx.fillText('MOJAVE RUN', W/2, H * 0.32);

    ctx.fillStyle = 'rgba(245,215,110,0.85)';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText('A WASTELAND ARCADE DRIVER', W/2, H * 0.32 + 44);

    ctx.fillStyle = '#fff3b0';
    ctx.font = '14px "Courier New", monospace';
    const lines = [
      '',
      '◄ ►   /   A D     STEER',
      'SPACE   /   Z X    FIRE',
      '',
      'COLLECT SCRAP   //   AVOID WRECKS',
      'SHOOT BARRELS   //   CHAIN BOOMS',
      '',
    ];
    let y = H * 0.5;
    for (const l of lines) { ctx.fillText(l, W/2, y); y += 22; }

    if (game.best > 0) {
      ctx.fillStyle = 'rgba(245,215,110,0.7)';
      ctx.fillText('BEST   ' + String(game.best).padStart(6, '0'), W/2, y + 6);
      y += 28;
    }

    const blink = Math.floor(game.t * 2) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#f5d76e';
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.fillText('PRESS SPACE / TAP TO START', W/2, y + 24);
    }

    ctx.fillStyle = 'rgba(245,215,110,0.4)';
    ctx.font = '10px "Courier New", monospace';
    ctx.fillText('1COMMERCE  //  PNW WASTELAND DIV.', W/2, H - 24);
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(20,8,4,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = '#1a0f08';
    ctx.font = 'bold 56px "Courier New", monospace';
    ctx.fillText('YOU DIED', W/2 + 3, H * 0.36 + 3);
    ctx.fillStyle = '#ff5050';
    ctx.fillText('YOU DIED', W/2, H * 0.36);

    ctx.fillStyle = '#f5d76e';
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillText('SCORE   ' + String(Math.floor(game.score)).padStart(6, '0'), W/2, H * 0.5);
    ctx.fillStyle = 'rgba(245,215,110,0.8)';
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.fillText('BEST    ' + String(game.best).padStart(6, '0'), W/2, H * 0.5 + 28);
    ctx.fillText('SECTOR  ' + game.level, W/2, H * 0.5 + 52);
    ctx.fillText('DISTANCE ' + Math.floor(game.distance) + ' M', W/2, H * 0.5 + 76);

    const blink = Math.floor(game.t * 2) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#f5d76e';
      ctx.font = 'bold 14px "Courier New", monospace';
      ctx.fillText('PRESS R / TAP TO RUN AGAIN', W/2, H * 0.5 + 120);
    }
  }

  function render() {
    ctx.save();
    if (game.shake > 0) {
      const s = game.shake * 14;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }
    drawBackground();
    drawRoad();
    drawDecor();

    // entities
    for (const o of game.obstacles) drawObstacle(o);
    for (const e of game.enemies) drawEnemy(e);
    for (const pk of game.pickups) drawPickup(pk);
    drawBullets();
    if (game.state === 'playing' || game.state === 'gameover') drawPlayer();
    drawParticles();

    // damage flash
    if (game.flash > 0) {
      ctx.fillStyle = `rgba(255,80,80,${game.flash * 0.4})`;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.restore();

    // vignette
    const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    if (game.state === 'playing') drawHUD();
    if (game.state === 'title') drawTitle();
    if (game.state === 'gameover') { drawHUD(); drawGameOver(); }
  }

  // ============ LOOP ============
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ============ INIT ============
  // start on title screen with idle decor
  game.player.x = W * 0.5;
  game.player.y = H - 110;
  for (let i = 0; i < 36; i++) game.decor.push(makeDecor(Math.random() * H));
})();
</script>
</body>
